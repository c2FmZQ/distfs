<!DOCTYPE html>
<html>
<head>
    <title>DistFS Web Client</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; background-color: #f5f5f5;}
        header { background: #333; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .controls button { padding: 8px 16px; margin-left: 10px; cursor: pointer; }
        
        #app-container { display: flex; flex: 1; overflow: hidden; }
        
        #sidebar { width: 250px; background: #fff; border-right: 1px solid #ccc; overflow-y: auto; padding: 10px; }
        #sidebar ul { list-style-type: none; padding-left: 20px; }
        #sidebar li { cursor: pointer; padding: 4px 0; }
        #sidebar li:hover { background-color: #eee; }
        
        #main-view { flex: 1; display: flex; flex-direction: column; background: #fff; overflow-y: auto; position: relative;}
        #breadcrumb { padding: 10px 20px; border-bottom: 1px solid #ccc; background: #fafafa; font-weight: bold;}
        
        #file-list { flex: 1; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; align-content: start;}
        .file-item { border: 1px solid #ddd; padding: 15px; text-align: center; border-radius: 6px; cursor: pointer; background: #fafafa; transition: box-shadow 0.2s;}
        .file-item:hover { box-shadow: 0 4px 8px rgba(0,0,0,0.1); background: #fff;}
        .file-icon { font-size: 2em; margin-bottom: 10px; }
        .file-name { word-break: break-all; font-size: 0.9em; }

        /* Drag & Drop Overlay */
        #drop-zone { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); color: white; display: none; justify-content: center; align-items: center; font-size: 2em; z-index: 10; }
        #main-view.dragover #drop-zone { display: flex; }

        /* Auth Overlay */
        #auth-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #status { margin-top: 20px; padding: 15px; font-family: monospace; color: #555;}
    </style>
</head>
<body>
    <div id="auth-overlay">
        <h1>DistFS Zero-Knowledge File Manager</h1>
        <div class="controls">
            <button id="btn-login">Login (Existing Account)</button>
            <button id="btn-new-account">Create New Account</button>
        </div>
        <div id="status">Loading WASM Environment...</div>
    </div>

    <header>
        <h2>DistFS</h2>
        <div id="user-info">Not logged in</div>
    </header>

    <div id="app-container">
        <div id="sidebar">
            <div style="font-weight:bold; margin-bottom:10px;">Directory Tree</div>
            <ul id="tree-root">
                <li data-path="/">/ (Root)</li>
            </ul>
        </div>
        
        <div id="main-view">
            <div id="breadcrumb">/</div>
            <div id="file-list">
                <!-- File items populated dynamically -->
            </div>
            <div id="drop-zone">Drop files here to upload securely</div>
        </div>
    </div>

    <!-- Sharing Modal -->
    <div id="share-modal" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index: 200; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:8px; min-width:300px;">
            <h3>Share File</h3>
            <p id="share-file-name"></p>
            <div style="margin-bottom:15px;">
                <label>User/Group Email:</label><br>
                <input type="text" id="share-target-email" style="width:100%; padding:5px; margin-top:5px;" placeholder="alice@example.com">
            </div>
            <div style="margin-bottom:15px;">
                <label>Permissions:</label><br>
                <select id="share-perms" style="width:100%; padding:5px; margin-top:5px;">
                    <option value="r--">Read-Only</option>
                    <option value="rw-">Read-Write</option>
                </select>
            </div>
            <div style="display:flex; justify-content:flex-end;">
                <button id="btn-cancel-share" style="background:#ccc; border:none;">Cancel</button>
                <button id="btn-confirm-share" style="background:#007bff; color:white; border:none;">Apply</button>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log('Service Worker Registered');
            });
        }
    </script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
